<div class="split-layout">

    {% for img in images %}
    <div class="split-row {% if forloop.counter|divisibleby:2 %}reverse{% endif %}">

        <!-- รูป -->
        <div class="split-image">
            <img
                src="{{ img.image.url }}"
                alt="{{ project.title }}"
                class="project-thumb"
                data-full="{{ img.image.url }}"
            >
        </div>

    </div>
    {% endfor %}

</div>
