<div class="split-layout">

    {% for img in images %}
    <div class="split-row {% if forloop.counter|divisibleby:2 %}reverse{% endif %}">

        <!-- รูป -->
        <div class="split-image">
            <img
                src="{{ img.image.url }}"
                alt="{{ project.title }}"
                class="project-thumb"
                data-full="{{ img.image.url }}"
            >
        </div>

        <!-- ข้อความ 
        <div class="split-text">
            <h3>{{ project.title }}</h3>
            <p>{{ project.description }}</p>
        </div> -->

    </div>
    {% endfor %}

</div>

<!-- 💡 อัปเกรดเพิ่ม (ถ้าอยากโหดขึ้น)

ถ้า Lek ไม่อยากให้ข้อความซ้ำทุกรูป
👉 เปลี่ยนเป็นใช้ alt_text:

<p>{{ img.alt_text }}</p>

แล้วหน้าเว็บจะเปลี่ยนทันที 🔥 -->
