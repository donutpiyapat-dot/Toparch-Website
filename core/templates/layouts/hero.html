{% if images and images|length > 0 %}
<div class="hero-main">
    <img
        src="{{ images.0.image.url }}?f_auto,q_auto,w_800"
        class="project-thumb"
        data-full="{{ images.0.image.url }}?f_auto,q_auto,w_1600"
        loading="lazy"
        alt="{{ project.title }}"
    >
</div>
{% endif %}
