{% if images %}
<div class="hero-main">
    {% for image in images %}
        <img
            src="{{ image.image.url }}?f_auto,q_auto,w_800"
            class="project-thumb"
            data-full="{{ image.image.url }}?f_auto,q_auto,w_1600"
            loading="lazy"
            alt="{{ project.title }}"
        >
    {% endfor %}
</div>
{% endif %}
